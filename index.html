<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste Jogo</title>

<style>
body{background:#0d1b2a;color:#fff;font-family:Arial;text-align:center;}
.fases{display:flex;justify-content:center;gap:20px;margin-top:50px;}
.fase{width:60px;height:60px;border-radius:50%;background:green;display:flex;align-items:center;justify-content:center;cursor:pointer;}
</style>

</head>

<body>

<h1>🗺️ Fases</h1>

<div id="mapaFases" class="fases"></div>

<script>

document.addEventListener("DOMContentLoaded", function(){

  console.log("HTML carregado");

  const mapa = document.getElementById("mapaFases");

  if(!mapa){
    alert("AINDA NÃO FUNCIONOU → HTML errado");
    return;
  }

  console.log("mapa encontrado!");

  for(let i=1;i<=3;i++){
    const div = document.createElement("div");
    div.className="fase";
    div.innerText=i;
    mapa.appendChild(div);
  }

});

</script>

</body>
</html>
