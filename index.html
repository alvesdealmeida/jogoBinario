<script>

let faseAtual = 0;
let score = 0;

const fases = [
 ["00000","00100","01110","00100","00000"],
 ["00000","01110","11111","01110","00000"]
];

let desbloqueadas = [true,false];
let imagemAtual = [];

/* GARANTE QUE RODA DEPOIS DO HTML */
document.addEventListener("DOMContentLoaded", iniciar);

function iniciar(){
  console.log("Jogo iniciado");
  renderMapa();
}

/* MAPA */
function renderMapa(){
  const mapa = document.getElementById("mapaFases");

  if(!mapa){
    console.error("mapaFases não encontrado");
    return;
  }

  mapa.innerHTML="";

  for(let i=0;i<fases.length;i++){
    const div = document.createElement("div");

    div.className = "fase " + (desbloqueadas[i] ? "liberada":"bloqueada");
    div.innerText = i+1;

    if(desbloqueadas[i]){
      div.onclick = function(){
        iniciarFase(i);
      }
    }

    mapa.appendChild(div);
  }
}

/* INICIAR FASE */
function iniciarFase(i){
  faseAtual = i;

  document.getElementById("mapaTela").style.display="none";
  document.getElementById("jogoTela").style.display="block";

  carregarFase();
}

/* CARREGAR */
function carregarFase(){
  imagemAtual = fases[faseAtual];
  render();
}

/* RENDER */
function render(){
  const grid = document.getElementById("grid");
  const binary = document.getElementById("binary");

  grid.innerHTML="";
  binary.innerHTML="";

  grid.style.gridTemplateColumns = "repeat(5,1fr)";

  for(let linha of imagemAtual){

    const row = document.createElement("div");
    row.innerText = linha.split("").join(" ");
    binary.appendChild(row);

    for(let bit of linha){
      const cell = document.createElement("div");
      cell.className="cell";

      cell.onclick = function(){
        this.classList.toggle("active");
      }

      grid.appendChild(cell);
    }
  }
}

/* VALIDAR */
function validar(){
  alert("Funcionando!");
}

/* LIMPAR */
function limpar(){
  document.querySelectorAll(".cell").forEach(c=>{
    c.classList.remove("active");
  });
}

/* VOLTAR */
function voltarMapa(){
  document.getElementById("jogoTela").style.display="none";
  document.getElementById("mapaTela").style.display="flex";
}

</script>
