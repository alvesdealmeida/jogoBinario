<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Binário Educacional</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#111;
  color:#fff;
}

/* TÍTULO */
h1 {
  text-align:center;
  margin:10px;
}

/* CONTROLES */
.controls {
  text-align:center;
  margin-bottom:10px;
}

button {
  padding:8px;
  margin:5px;
  border:none;
  border-radius:5px;
  background:#00c853;
  color:white;
  cursor:pointer;
}

/* LAYOUT DIVIDIDO */
.container {
  display:flex;
  height:calc(100vh - 140px);
}

/* LADO ESQUERDO (BINÁRIO) */
.left {
  width:50%;
  overflow:auto;
  padding:10px;
  background:#1a1a1a;
}

.binary {
  font-family:monospace;
  font-size:14px;
  line-height:16px;
}

/* LADO DIREITO (PIXEL) */
.right {
  width:50%;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* GRID */
.grid {
  display:grid;
  gap:1px;
  background:#444;
}

.cell {
  width:16px;
  height:16px;
  background:white;
  cursor:pointer;
}

.cell.active {
  background:black;
}

/* RODAPÉ */
.footer {
  text-align:center;
}

/* RESPONSIVO */
@media(max-width:768px){
  .container {
    flex-direction:column;
  }

  .left, .right {
    width:100%;
    height:50%;
  }

  .cell {
    width:12px;
    height:12px;
  }
}
</style>
</head>

<body>

<h1>🧠 Painel Binário Educacional</h1>

<div class="controls">
  Série:
  <button onclick="setSerie('3')">3º Ano</button>
  <button onclick="setSerie('4')">4º Ano</button>
  <button onclick="setSerie('5')">5º Ano</button>

  <br>

  <button onclick="validar()">✔ Validar</button>
  <button onclick="limpar()">🧹 Limpar</button>

  <br>

  📷 Upload: <input type="file" onchange="uploadImagem(event)">
</div>

<div class="container">

  <!-- BINÁRIO -->
  <div class="left" id="binary"></div>

  <!-- PAINEL -->
  <div class="right">
    <div id="grid" class="grid"></div>
  </div>

</div>

<div class="footer">
  <h3>🏆 Pontuação: <span id="score">0</span></h3>
  <h3>🥇 Ranking</h3>
  <ul id="ranking"></ul>
</div>

<script>

let imagemAtual = [];
let score = 0;
let serie = "3";

/* FASES POR SÉRIE */
const fases = {
  "3": [
    [
      "00000",
      "00100",
      "01110",
      "00100",
      "00000"
    ]
  ],
  "4": [
    [
      "0000000000",
      "0011111100",
      "0111111110",
      "0011111100",
      "0000000000"
    ]
  ],
  "5": [
    [
      "000000000000",
      "001111111100",
      "011111111110",
      "001111111100",
      "000000000000"
    ]
  ]
};

/* TROCAR SÉRIE */
function setSerie(s){
  serie = s;
  carregarFase();
}

/* CARREGAR FASE */
function carregarFase(){
  imagemAtual = fases[serie][0];
  render();
}

/* RENDERIZAÇÃO */
function render(){
  const grid = document.getElementById("grid");
  const binary = document.getElementById("binary");

  grid.innerHTML = "";
  binary.innerHTML = "";

  let tamanho = imagemAtual[0].length;
  grid.style.gridTemplateColumns = `repeat(${tamanho}, 1fr)`;

  imagemAtual.forEach(linha => {

    /* BINÁRIO */
    const row = document.createElement("div");
    row.className = "binary";
    row.textContent = linha;
    binary.appendChild(row);

    /* GRID */
    [...linha].forEach(bit => {
      const cell = document.createElement("div");
      cell.className = "cell";

      cell.onclick = () => cell.classList.toggle("active");

      grid.appendChild(cell);
    });

  });
}

/* VALIDAÇÃO */
function validar(){
  const cells = document.querySelectorAll(".cell");
  let correto = true;
  let i = 0;

  imagemAtual.forEach(linha=>{
    [...linha].forEach(bit=>{
      const ativo = cells[i].classList.contains("active");

      if((bit==="1" && !ativo) || (bit==="0" && ativo)){
        correto = false;
      }
      i++;
    });
  });

  if(correto){
    alert("🎉 Acertou!");
    score += 10;
    salvarRanking();
  } else {
    alert("❌ Ainda não está correto");
  }

  document.getElementById("score").textContent = score;
}

/* LIMPAR */
function limpar(){
  document.querySelectorAll(".cell").forEach(c => c.classList.remove("active"));
}

/* RANKING */
function salvarRanking(){
  let ranking = JSON.parse(localStorage.getItem("ranking")) || [];
  ranking.push(score);
  ranking.sort((a,b)=>b-a);
  ranking = ranking.slice(0,5);

  localStorage.setItem("ranking", JSON.stringify(ranking));
  mostrarRanking();
}

function mostrarRanking(){
  const ul = document.getElementById("ranking");
  ul.innerHTML = "";

  let ranking = JSON.parse(localStorage.getItem("ranking")) || [];

  ranking.forEach(p=>{
    const li = document.createElement("li");
    li.textContent = p + " pontos";
    ul.appendChild(li);
  });
}

/* UPLOAD IMAGEM → BINÁRIO */
function uploadImagem(event){
  const file = event.target.files[0];
  const img = new Image();

  img.onload = ()=>{
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 20;
    canvas.height = 20;

    ctx.drawImage(img, 0, 0, 20, 20);

    const data = ctx.getImageData(0,0,20,20).data;

    let nova = [];

    for(let y=0;y<20;y++){
      let linha="";
      for(let x=0;x<20;x++){
        const i = (y*20+x)*4;
        const brilho = data[i] + data[i+1] + data[i+2];

        linha += brilho > 382 ? "0" : "1";
      }
      nova.push(linha);
    }

    imagemAtual = nova;
    render();
  };

  img.src = URL.createObjectURL(file);
}

/* INICIAR */
carregarFase();
mostrarRanking();

</script>

</body>
</html>
